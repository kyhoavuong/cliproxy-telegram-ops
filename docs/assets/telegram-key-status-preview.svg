<svg xmlns="http://www.w3.org/2000/svg" width="920" height="520" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">Sanitized Telegram key status preview</title>
  <desc id="desc">A mock Telegram message showing key status and management buttons.</desc>
  <rect width="920" height="520" fill="#f4f7fb"/>
  <rect x="80" y="48" width="760" height="424" rx="24" fill="#ffffff" stroke="#d7e1ef"/>
  <rect x="80" y="48" width="760" height="62" rx="24" fill="#2aabee"/>
  <text x="128" y="88" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff">Telegram Bot Preview</text>
  <text x="128" y="154" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#172033">Key Status</text>
  <text x="128" y="188" font-family="Inter, Arial, sans-serif" font-size="17" fill="#5a687a">Data: updated 14s ago</text>
  <text x="128" y="232" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#172033">Summary</text>
  <text x="128" y="266" font-family="Inter, Arial, sans-serif" font-size="18" fill="#273142">- Active keys: 27</text>
  <text x="128" y="296" font-family="Inter, Arial, sans-serif" font-size="18" fill="#273142">- Disabled keys: 2</text>
  <text x="128" y="326" font-family="Inter, Arial, sans-serif" font-size="18" fill="#273142">- Missing from config: 0</text>
  <text x="128" y="356" font-family="Inter, Arial, sans-serif" font-size="18" fill="#273142">- Uncapped weekly: 7 active, 0 disabled</text>
  <text x="500" y="232" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700" fill="#172033">Disabled Keys</text>
  <text x="500" y="266" font-family="Inter, Arial, sans-serif" font-size="18" fill="#273142">- example-user-a (manually disabled)</text>
  <text x="500" y="296" font-family="Inter, Arial, sans-serif" font-size="18" fill="#273142">- example-user-b (quota exceeded)</text>
  <rect x="128" y="400" width="152" height="42" rx="10" fill="#edf5ff" stroke="#b8d7ff"/>
  <rect x="294" y="400" width="142" height="42" rx="10" fill="#edf5ff" stroke="#b8d7ff"/>
  <rect x="450" y="400" width="128" height="42" rx="10" fill="#edf5ff" stroke="#b8d7ff"/>
  <text x="157" y="427" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#1f5f9c">Disable key</text>
  <text x="325" y="427" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#1f5f9c">Enable key</text>
  <text x="484" y="427" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#1f5f9c">Refresh</text>
</svg>
