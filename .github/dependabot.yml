version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"
    open-pull-requests-limit: 5
    commit-message:
      prefix: ci

  - package-ecosystem: docker
    directory: /quota-gate
    schedule:
      interval: weekly
    groups:
      docker-base-images:
        patterns:
          - "*"
    open-pull-requests-limit: 5
    commit-message:
      prefix: build

  - package-ecosystem: docker
    directory: /telegram-alerts
    schedule:
      interval: weekly
    groups:
      docker-base-images:
        patterns:
          - "*"
    open-pull-requests-limit: 5
    commit-message:
      prefix: build
